# Reverse proxy for api.hiremebharat.com → Docker API gateway (127.0.0.1:3001)
# TLS: either Let’s Encrypt (paths below) or self-signed / Cloudflare Origin CA at
# /etc/ssl/hiremebharat/api.crt and /etc/ssl/hiremebharat/api.key

upstream hireme_api_gateway {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.hiremebharat.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.hiremebharat.com;

    ssl_certificate     /etc/ssl/hiremebharat/api.crt;
    ssl_certificate_key /etc/ssl/hiremebharat/api.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location / {
        proxy_pass http://hireme_api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Firebase-Authorization $http_x_firebase_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
