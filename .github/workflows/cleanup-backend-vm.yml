name: Cleanup Backend VM Disk

on:
  schedule:
    # Nightly at 03:15 UTC — keeps the GCP VM disk from filling between deploys.
    - cron: '15 3 * * *'
  workflow_dispatch:
    inputs:
      cleanup_mode:
        description: 'light (cache only), standard (default), or aggressive'
        required: false
        default: standard
        type: choice
        options:
          - light
          - standard
          - aggressive
      keep_registry_tags:
        description: 'Registry tags to keep per service (besides latest/cache/compose)'
        required: false
        default: '6'
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH deploy key
        env:
          SSH_KEY: ${{ secrets.GCP_VM_SSH_KEY }}
          SSH_PASS: ${{ secrets.GCP_VM_SSH_KEY_PASSPHRASE }}
        run: bash scripts/ci/prepare-ssh-deploy-key.sh

      - name: Encode cleanup payloads
        id: cleanup_bundle
        run: bash scripts/ci/encode-cleanup-script.sh

      - name: Run VM disk cleanup over SSH
        uses: appleboy/ssh-action@v0.1.10
        env:
          BOOTSTRAP_B64: ${{ steps.cleanup_bundle.outputs.bootstrap_b64 }}
          SCRIPT_B64: ${{ steps.cleanup_bundle.outputs.cleanup_b64 }}
          CLEANUP_MODE: ${{ github.event.inputs.cleanup_mode || 'standard' }}
          KEEP_REGISTRY_TAGS: ${{ github.event.inputs.keep_registry_tags || '6' }}
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          command_timeout: 15m
          envs: BOOTSTRAP_B64,SCRIPT_B64,CLEANUP_MODE,KEEP_REGISTRY_TAGS
          script: |
            set -u
            echo "=== Phase 1: emergency bootstrap (no file writes) ==="
            printf '%s' "$BOOTSTRAP_B64" | base64 -d | bash -s
            echo "=== Phase 2: full cleanup (streamed to bash, no SCP) ==="
            printf '%s' "$SCRIPT_B64" | base64 -d | bash -s
