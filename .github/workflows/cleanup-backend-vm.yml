name: Cleanup Backend VM Disk

on:
  schedule:
    # Nightly at 03:15 UTC — keeps the GCP VM disk from filling between deploys.
    - cron: '15 3 * * *'
  workflow_dispatch:
    inputs:
      cleanup_mode:
        description: 'light (cache only), standard (default), or aggressive'
        required: false
        default: standard
        type: choice
        options:
          - light
          - standard
          - aggressive
      keep_registry_tags:
        description: 'Registry tags to keep per service (besides latest/cache/compose)'
        required: false
        default: '6'
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH deploy key
        env:
          SSH_KEY: ${{ secrets.GCP_VM_SSH_KEY }}
          SSH_PASS: ${{ secrets.GCP_VM_SSH_KEY_PASSPHRASE }}
        run: bash scripts/ci/prepare-ssh-deploy-key.sh

      - name: Encode cleanup script
        id: cleanup_bundle
        run: bash scripts/ci/encode-cleanup-script.sh

      - name: Run VM disk cleanup over SSH
        uses: appleboy/ssh-action@v0.1.10
        env:
          SCRIPT_B64: ${{ steps.cleanup_bundle.outputs.payload }}
          CLEANUP_MODE: ${{ github.event.inputs.cleanup_mode || 'standard' }}
          KEEP_REGISTRY_TAGS: ${{ github.event.inputs.keep_registry_tags || '6' }}
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          command_timeout: 15m
          envs: SCRIPT_B64,CLEANUP_MODE,KEEP_REGISTRY_TAGS
          script: |
            set -euo pipefail
            mkdir -p /opt/hiremebharat
            echo "=== Bootstrap: emergency Docker prune (no SCP — works when disk is full) ==="
            df -h / || true
            docker builder prune -af || true
            docker container prune -f || true
            docker image prune -af || true
            printf '%s' "$SCRIPT_B64" | base64 -d > /opt/hiremebharat/cleanup-vm-docker.sh
            chmod +x /opt/hiremebharat/cleanup-vm-docker.sh
            /opt/hiremebharat/cleanup-vm-docker.sh
