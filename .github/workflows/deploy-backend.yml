name: Build and Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/api-gateway/**'
      - 'apps/api-auth/**'
      - 'apps/api-employee/**'
      - 'apps/api-employer/**'
      - 'apps/api-admin/**'
      - 'packages/backend-core/**'
      - '.github/workflows/deploy-backend.yml'
      - 'deploy-full-stack.sh'
  workflow_dispatch:

jobs:
  # Matrix jobs only deploy when files under each app/ (or backend-core) change.
  # Commits that only touch CI / deploy-full-stack.sh must run full-stack-deploy instead.
  meta:
    runs-on: ubuntu-latest
    outputs:
      run_full_stack: ${{ steps.set.outputs.run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect workflow or full-stack script changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        id: infra
        with:
          filters: |
            match:
              - '.github/workflows/deploy-backend.yml'
              - 'deploy-full-stack.sh'
      - name: Set run_full_stack
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.infra.outputs.match }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: meta
    if: github.event_name == 'push' && needs.meta.outputs.run_full_stack != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, api-auth, api-employee, api-employer, api-admin]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."${{ secrets.GCP_VM_IP }}:5000"]
              http = true

      - name: Extract service name
        id: service-name
        run: echo "service=${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Check if service changed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            service-changed:
              - 'apps/${{ matrix.service }}/**'
              - 'packages/backend-core/**'

      - name: Prepare SSH deploy key (decrypt for appleboy)
        if: steps.changes.outputs.service-changed == 'true'
        env:
          SSH_KEY: ${{ secrets.GCP_VM_SSH_KEY }}
          SSH_PASS: ${{ secrets.GCP_VM_SSH_KEY_PASSPHRASE }}
        run: |
          set -eo pipefail
          KEYFILE="${GITHUB_WORKSPACE}/.ci_deploy_key"
          umask 077
          printf '%s\n' "${SSH_KEY}" > "${KEYFILE}"
          if ssh-keygen -y -f "${KEYFILE}" -P '' >/dev/null 2>&1; then
            echo "SSH deploy key has no passphrase"
          else
            if [ -z "${SSH_PASS}" ]; then
              echo "::error::GCP_VM_SSH_KEY is passphrase-protected. Add repository secret GCP_VM_SSH_KEY_PASSPHRASE, or replace GCP_VM_SSH_KEY with an unencrypted deploy key."
              exit 1
            fi
            if ! ssh-keygen -p -f "${KEYFILE}" -P "${SSH_PASS}" -N ''; then
              echo "::error::Could not unlock GCP_VM_SSH_KEY (wrong GCP_VM_SSH_KEY_PASSPHRASE?)"
              exit 1
            fi
          fi

      - name: Cleanup GCP VM storage
        if: steps.changes.outputs.service-changed == 'true'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          script: |
            docker system prune -f
            docker image prune -f

      - name: Build and push Docker image
        if: steps.changes.outputs.service-changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_PATH=apps/${{ matrix.service }}
          push: true
          tags: ${{ secrets.GCP_VM_IP }}:5000/hiremebharat-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.GCP_VM_IP }}:5000/hiremebharat-${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ secrets.GCP_VM_IP }}:5000/hiremebharat-${{ matrix.service }}:cache,mode=max

      - name: Prepare configuration files
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env.prod
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.prod
          echo "FIREBASE_PRIVATE_KEY=\"${{ secrets.FIREBASE_PRIVATE_KEY }}\"" >> .env.prod
          echo "FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}" >> .env.prod
          echo "NODE_ENV=production" >> .env.prod

      - name: Copy config to GCP VM
        if: steps.changes.outputs.service-changed == 'true'
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          source: "docker-compose.prod.yml,.env.prod,deploy-service.sh"
          target: "/opt/hiremebharat/"

      - name: Execute deployment on GCP VM
        if: steps.changes.outputs.service-changed == 'true'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          script: |
            cd /opt/hiremebharat
            mv .env.prod .env
            chmod +x deploy-service.sh
            ./deploy-service.sh ${{ matrix.service }} ${{ github.sha }}

  verify-public-api:
    name: Verify public API (HTTPS)
    needs: build-and-deploy
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Curl public /api/health via Cloudflare
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || secrets.PUBLIC_API_URL }}
        run: bash scripts/ci/verify-public-api.sh

  full-stack-deploy:
    needs: meta
    if: needs.meta.outputs.run_full_stack == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH deploy key (decrypt for appleboy)
        env:
          SSH_KEY: ${{ secrets.GCP_VM_SSH_KEY }}
          SSH_PASS: ${{ secrets.GCP_VM_SSH_KEY_PASSPHRASE }}
        run: |
          set -eo pipefail
          KEYFILE="${GITHUB_WORKSPACE}/.ci_deploy_key"
          umask 077
          printf '%s\n' "${SSH_KEY}" > "${KEYFILE}"
          if ssh-keygen -y -f "${KEYFILE}" -P '' >/dev/null 2>&1; then
            echo "SSH deploy key has no passphrase"
          else
            if [ -z "${SSH_PASS}" ]; then
              echo "::error::GCP_VM_SSH_KEY is passphrase-protected. Add repository secret GCP_VM_SSH_KEY_PASSPHRASE, or replace GCP_VM_SSH_KEY with an unencrypted deploy key."
              exit 1
            fi
            if ! ssh-keygen -p -f "${KEYFILE}" -P "${SSH_PASS}" -N ''; then
              echo "::error::Could not unlock GCP_VM_SSH_KEY (wrong GCP_VM_SSH_KEY_PASSPHRASE?)"
              exit 1
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."${{ secrets.GCP_VM_IP }}:5000"]
              http = true

      - name: Cleanup GCP VM storage
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          script: |
            docker system prune -f

      - name: Prepare configuration files
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env.prod
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.prod
          echo "FIREBASE_PRIVATE_KEY=\"${{ secrets.FIREBASE_PRIVATE_KEY }}\"" >> .env.prod
          echo "FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}" >> .env.prod
          echo "NODE_ENV=production" >> .env.prod
          if [ -z "${{ secrets.REGISTRY_USER }}" ]; then echo "REGISTRY_USER=hiremeregistry" >> .env.prod; else echo "REGISTRY_USER=${{ secrets.REGISTRY_USER }}" >> .env.prod; fi
          if [ -z "${{ secrets.REGISTRY_PASSWORD }}" ]; then echo "REGISTRY_PASSWORD=hiremeregistry" >> .env.prod; else echo "REGISTRY_PASSWORD=${{ secrets.REGISTRY_PASSWORD }}" >> .env.prod; fi

      - name: Docker login to VM registry
        run: |
          RU=$(grep '^REGISTRY_USER=' .env.prod | cut -d= -f2-)
          RP=$(grep '^REGISTRY_PASSWORD=' .env.prod | cut -d= -f2-)
          echo "${RP}" | docker login "${{ secrets.GCP_VM_IP }}:5000" -u "${RU}" --password-stdin

      - name: Build and push all services
        run: |
          set -e
          for svc in api-gateway api-auth api-employee api-employer api-admin; do
            docker buildx build \
              --push \
              --file "apps/${svc}/Dockerfile" \
              --build-arg "SERVICE_NAME=${svc}" \
              --build-arg "SERVICE_PATH=apps/${svc}" \
              --tag "${{ secrets.GCP_VM_IP }}:5000/hiremebharat-${svc}:${{ github.sha }}" \
              --cache-from "type=registry,ref=${{ secrets.GCP_VM_IP }}:5000/hiremebharat-${svc}:cache" \
              --cache-to "type=registry,ref=${{ secrets.GCP_VM_IP }}:5000/hiremebharat-${svc}:cache,mode=max" \
              .
          done

      - name: Copy config to GCP VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          source: "docker-compose.prod.yml,.env.prod,deploy-full-stack.sh"
          target: "/opt/hiremebharat/"

      - name: Execute full-stack deployment
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          script: |
            cd /opt/hiremebharat
            mv -f .env.prod .env
            chmod +x deploy-full-stack.sh
            ./deploy-full-stack.sh ${{ github.sha }}

      - name: Verify API health on VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key_path: .ci_deploy_key
          script: |
            set -e
            for i in $(seq 1 45); do
              if curl -sfS --max-time 5 http://127.0.0.1:3001/api/health > /tmp/h.json; then
                echo "Health OK:"
                cat /tmp/h.json
                exit 0
              fi
              echo "waiting for gateway ($i)..."
              sleep 2
            done
            echo "Health check failed"
            docker compose -f /opt/hiremebharat/docker-compose.prod.yml ps || true
            exit 1

      - name: Verify public API URL (HTTPS via Cloudflare)
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || secrets.PUBLIC_API_URL }}
        run: bash scripts/ci/verify-public-api.sh
